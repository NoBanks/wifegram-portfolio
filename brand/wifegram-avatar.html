<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1024px;
    height: 1024px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
  }
  .letter {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 144;
    color: #F5EFE6;
    font-size: 640px;
    line-height: 0.85;
    letter-spacing: -0.02em;
    text-shadow: 0 0 80px rgba(168, 84, 50, 0.12);
  }
  .rule {
    width: 220px;
    height: 5px;
    background: #A85432;
    border-radius: 2px;
  }
  .wordmark {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 96;
    color: #F5EFE6;
    font-size: 92px;
    letter-spacing: 0.02em;
    opacity: 0.92;
  }
</style>
</head>
<body>
  <div class="mark">
    <div class="letter">W</div>
    <div class="rule"></div>
    <div class="wordmark">Wifegram</div>
  </div>
</body>
</html>
